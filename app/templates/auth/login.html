{% extends "base.html" %}

{% block title %}Log in — DeutschLern AI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
  <h1 class="text-2xl font-bold mb-6">Welcome back</h1>

  <form action="/auth/login" method="post" class="space-y-4">

    <div>
      <label for="email"
             class="block text-sm font-medium text-gray-700 mb-1">
        Email address
      </label>
      <input type="email" id="email" name="email" required
             placeholder="you@example.com"
             class="w-full border border-gray-300 rounded-md px-3 py-2
                    focus:outline-none focus:ring-2 focus:ring-black text-sm" />
    </div>

    <div>
      <label for="password"
             class="block text-sm font-medium text-gray-700 mb-1">
        Password
      </label>
      <input type="password" id="password" name="password" required
             placeholder="Your password"
             class="w-full border border-gray-300 rounded-md px-3 py-2
                    focus:outline-none focus:ring-2 focus:ring-black text-sm" />
    </div>

    <button type="submit"
            class="w-full bg-black text-white py-2 rounded-md text-sm
                   font-medium hover:bg-gray-800 transition">
      Log in
    </button>

  </form>

  <p class="mt-4 text-sm text-gray-500 text-center">
    No account yet?
    <a href="/auth/register" class="text-black underline">Register</a>
  </p>
</div>
{% endblock %}
