{% extends "base.html" %}

{% block title %}Register — DeutschLern AI{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
  <h1 class="text-2xl font-bold mb-6">Create your account</h1>

  <form action="/auth/register" method="post" class="space-y-4">

    <div>
      <label for="username"
             class="block text-sm font-medium text-gray-700 mb-1">
        Username
      </label>
      <input type="text" id="username" name="username" required
             placeholder="e.g. anna_berlin"
             class="w-full border border-gray-300 rounded-md px-3 py-2
                    focus:outline-none focus:ring-2 focus:ring-black text-sm" />
    </div>

    <div>
      <label for="email"
             class="block text-sm font-medium text-gray-700 mb-1">
        Email address
      </label>
      <input type="email" id="email" name="email" required
             placeholder="you@example.com"
             class="w-full border border-gray-300 rounded-md px-3 py-2
                    focus:outline-none focus:ring-2 focus:ring-black text-sm" />
    </div>

    <div>
      <label for="password"
             class="block text-sm font-medium text-gray-700 mb-1">
        Password
      </label>
      <input type="password" id="password" name="password" required
             placeholder="At least 8 characters"
             class="w-full border border-gray-300 rounded-md px-3 py-2
                    focus:outline-none focus:ring-2 focus:ring-black text-sm" />
    </div>

    <button type="submit"
            class="w-full bg-black text-white py-2 rounded-md text-sm
                   font-medium hover:bg-gray-800 transition">
      Create account
    </button>

  </form>

  <p class="mt-4 text-sm text-gray-500 text-center">
    Already have an account?
    <a href="/auth/login" class="text-black underline">Log in</a>
  </p>
</div>
{% endblock %}
