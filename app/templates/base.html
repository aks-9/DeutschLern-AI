<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DeutschLern AI{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/output.css" />
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body class="min-h-screen bg-gray-50 text-gray-800 flex flex-col">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="text-lg font-bold tracking-tight text-gray-900">
        🇩🇪 DeutschLern AI
      </a>
      <div class="flex items-center gap-4 text-sm">
        {% if user is defined and user %}
          <span class="text-gray-500">{{ user.username }}</span>
          <a href="/theory"
             class="text-gray-700 hover:text-gray-900 transition">Theory</a>
          <a href="/vocabulary"
             class="text-gray-700 hover:text-gray-900 transition">Vocabulary</a>
          <a href="/coach"
             class="text-gray-700 hover:text-gray-900 transition">Coach</a>
          <a href="/auth/logout"
             class="bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded transition">
            Log out
          </a>
        {% else %}
          <a href="/auth/login"
             class="text-gray-700 hover:text-gray-900 transition">Log in</a>
          <a href="/auth/register"
             class="bg-black text-white px-3 py-1 rounded hover:bg-gray-800 transition">
            Register
          </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Flash messages -->
  {% if flash %}
  <div class="max-w-5xl mx-auto px-4 mt-4 w-full">
    <div class="rounded-md px-4 py-3 text-sm
      {% if flash.type == 'error' %}bg-red-50 text-red-700 border border-red-200
      {% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
      {{ flash.message }}
    </div>
  </div>
  {% endif %}

  <!-- Page content -->
  <main class="flex-1 max-w-5xl mx-auto px-4 py-8 w-full">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-200 text-center text-xs text-gray-400 py-4">
    DeutschLern AI &mdash; AI Engineering Weiterbildung Berlin 2025
  </footer>

</body>
</html>
