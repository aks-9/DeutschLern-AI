{% if result.correct %}
<div class="rounded-lg bg-green-50 border border-green-200 px-4 py-3 text-sm text-green-800">
  <p class="font-semibold mb-1">✅ Correct!</p>
  <p>{{ result.feedback }}</p>
  <p class="mt-1 text-xs opacity-75">{{ result.feedback_en }}</p>
</div>
{% else %}
<div class="rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-800">
  <p class="font-semibold mb-1">❌ Not quite.</p>
  <p>{{ result.feedback }}</p>
  <p class="mt-1 text-xs opacity-75">{{ result.feedback_en }}</p>
  <p class="mt-2">Correct answer: <strong>{{ blank_word }}</strong></p>
</div>
{% endif %}

<a href="/exercises/{{ topic_id }}"
   class="inline-block mt-3 text-sm text-gray-600 hover:text-gray-900 underline transition">
  Try another &rarr;
</a>
