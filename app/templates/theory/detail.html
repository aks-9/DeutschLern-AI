{% extends "base.html" %}
{% block title %}{{ topic.title }} — DeutschLern AI{% endblock %}

{% block content %}

<!-- Header -->
<div class="mb-6 flex items-center justify-between">
  <a href="/theory"
     class="text-sm text-gray-500 hover:text-gray-700 transition">
    &larr; All Topics
  </a>
  <span class="text-xs font-semibold text-blue-600 bg-blue-50
               px-2 py-0.5 rounded">{{ topic.level }}</span>
</div>

<!-- Content -->
<div class="bg-white border border-gray-200 rounded-lg p-6 theory-content">
  {{ topic.content | safe }}
</div>

<!-- Practice button -->
<div class="mt-6">
  <a href="/exercises?topic_id={{ topic.id }}"
     class="inline-block bg-black text-white text-sm font-medium
            px-5 py-2.5 rounded hover:bg-gray-800 transition">
    Practice this topic &rarr;
  </a>
</div>

<!-- Prev / Next navigation -->
<div class="mt-6 flex justify-between">
  {% if prev_id %}
  <a href="/theory/{{ prev_id }}"
     class="text-sm text-gray-600 hover:text-gray-900 transition">
    &larr; Previous
  </a>
  {% else %}
  <span></span>
  {% endif %}

  {% if next_id %}
  <a href="/theory/{{ next_id }}"
     class="text-sm text-gray-600 hover:text-gray-900 transition">
    Next &rarr;
  </a>
  {% endif %}
</div>

{% endblock %}
