{% extends "base.html" %}
{% block title %}Theory — DeutschLern AI{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-gray-900">Grammar Theory</h1>
  <p class="text-gray-500 mt-1">A1 topics — work through them in order.</p>
</div>

<div class="grid gap-4 sm:grid-cols-2">
  {% for topic in topics %}
  <a href="/theory/{{ topic.id }}"
     class="block bg-white border border-gray-200 rounded-lg p-5
            hover:shadow-md transition">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs font-semibold text-blue-600 bg-blue-50
                   px-2 py-0.5 rounded">{{ topic.level }}</span>
      <span class="text-xs text-gray-400">#{{ topic.order_index }}</span>
    </div>
    <h2 class="text-base font-semibold text-gray-800">{{ topic.title }}</h2>
    <p class="text-sm text-blue-600 mt-3 font-medium">Study &rarr;</p>
  </a>
  {% endfor %}
</div>
{% endblock %}
